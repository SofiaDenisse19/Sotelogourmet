# =============================================================
# ? PROYECTO SOTELOGOURMET - ARQUITECTURA DE CONFIGURACIÓN
# =============================================================

# Nombre de la aplicación
spring.application.name=Sotelogourmet

# =============================================================
# ?? CONFIGURACIÓN DE CONEXIÓN POSTGRESQL (SUPABASE IPV4 POOLER)
# =============================================================
# NOTA SENIOR: Cambiamos el host directo por el del "pooler" en el puerto 6543 para solucionar la incompatibilidad IPv4
spring.datasource.url=jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:6543/postgres?prepareThreshold=0
# Nombre de usuario compuesto obligatorio para que el Pooler sepa a qué proyecto redirigirte
spring.datasource.username=postgres.wnukdxyctmxmzwpqeqsb

# Coloca aquí la clave de tu base de datos (asegúrate de que solo tenga letras y números, sin "!!")
spring.datasource.password=ClaveSotelo2026

# Driver de conexión oficial
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================================
# ? CONFIGURACIÓN HIKARICP (CONNECTION POOL)
# =============================================================
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.pool-name=SoteloGourmetHikariCP

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================================
# ? CONFIGURACIÓN SPRING DATA JPA / HIBERNATE
# =============================================================
# 'update' actualiza o crea las columnas y tablas faltantes en Supabase automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================================
# ? INICIALIZACIÓN DE DATOS (SEEDING AUTOMÁTICO EN SUPABASE)
# =============================================================
# Damos prioridad a que Hibernate cree/actualice las columnas antes de ejecutar el seed SQL
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data_seed.sql

# =============================================================
# ? AUDITORÍA Y REGISTRO SQL (CONSOLA DE INTELLIJ)
# =============================================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=trace
